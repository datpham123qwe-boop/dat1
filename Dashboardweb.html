<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thống kê Khóa học | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #003b73;
            --bg-light: #f7f9fa;
            --text-dark: #1c1d1f;
            --border-color: #d1d7dc;
        }
        body { font-family: 'Source Sans 3', sans-serif; color: var(--text-dark); }
        .flat-card { border: 1px solid var(--border-color); border-radius: 0; background: #fff; padding: 20px; }
        .btn-primary-flat { background: var(--primary-blue); color: #fff; border-radius: 0; border: none; padding: 10px 20px; font-weight: 700; }
        .table thead { background: var(--bg-light); }
        .table th, .table td { border-radius: 0 !important; vertical-align: middle; }
    </style>
</head>
<body class="bg-light">
    <div class="container py-5" style="max-width: 1340px;">
        <h2 class="fw-bold mb-4">Quản lý & Thống kê Khóa học</h2>

        <div class="flat-card shadow-sm">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="mb-0 fw-bold">Danh sách chi tiết</h4>
                <div class="d-flex gap-2">
                    <input type="text" id="searchInput" class="form-control border-dark rounded-0" placeholder="Tìm tên hoặc giảng viên...">
                    <button class="btn-primary-flat" onclick="loadFindingCourses()">Lọc</button>
                </div>
            </div>
            
            <table class="table table-hover border">
                <thead>
                    <tr>
                        <th>Mã KH</th>
                        <th>Tên Khóa Học</th>
                        <th>Giảng Viên</th>
                        <th onclick="toggleSort()" style="cursor: pointer;">
                            Doanh Thu <span id="sortIcon">↕</span>
                        </th>
                        <th class="text-end">Trạng thái</th>
                    </tr>
                </thead>
                <tbody id="courseTableBody"></tbody>
            </table>
        </div>
    </div>

    <script src="active.js"></script>
</body>
</html>
