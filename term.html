<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Khóa Học</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h2 class="mb-4">Hệ thống Quản lý Khóa học</h2>

    <!-- Form Nhập Liệu -->
    <div class="card p-4 mb-4">
        <h5 id="formTitle">Thêm Khóa Học Mới</h5>
        <form id="khoaHocForm" class="row g-3">
            <div class="col-md-2">
                <label class="form-label">Mã KH</label>
                <input type="text" id="makh" class="form-control" required>
            </div>
            <div class="col-md-2">
                <label class="form-label">Mã GV</label>
                <input type="text" id="magv" class="form-control" placeholder="ND01">
            </div>
            <div class="col-md-5">
                <label class="form-label">Tên Khóa Học</label>
                <input type="text" id="tenkhoahoc" class="form-control" required>
            </div>
            <div class="col-md-3">
                <label class="form-label">Giá Tiền</label>
                <input type="number" id="giatien" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Mô Tả</label>
                <textarea id="mota" class="form-control"></textarea>
            </div>
            <div class="col-md-6">
                <label class="form-label">Lộ Trình</label>
                <textarea id="lotrinh" class="form-control"></textarea>
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-primary" id="btnSave">Lưu Khóa Học</button>
                <button type="button" class="btn btn-secondary" onclick="resetForm()">Làm mới</button>
            </div>
        </form>
    </div>

    <!-- Bảng Danh Sách -->
    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>Mã KH</th>
                <th>Tên Khóa Học</th>
                <th>Giá</th>
                <th>Mã GV</th>
                <th>Hành động</th>
            </tr>
        </thead>
        <tbody id="listKhoaHoc"></tbody>
    </table>

    <script>
        let isEdit = false;

        // Tải danh sách khi mở trang
        async function loadCourses() {
            const res = await fetch('/api/khoahoc');
            const data = await res.json();
            const tbody = document.getElementById('listKhoaHoc');
            tbody.innerHTML = data.map(kh => `
                <tr>
                    <td>${kh.MaKH}</td>
                    <td>${kh.Ten_Khoa_Hoc}</td>
                    <td>${Number(kh.Gia_Tien).toLocaleString()} đ</td>
                    <td>${kh.MaGV || 'Chưa có'}</td>
                    <td>
                        <button class="btn btn-sm btn-warning" onclick="editCourse('${kh.MaKH}', '${kh.MaGV}', '${kh.Ten_Khoa_Hoc}', '${kh.Gia_Tien}')">Sửa</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteCourse('${kh.MaKH}')">Xóa</button>
                    </td>
                </tr>
            `).join('');
        }

        // Xử lý Thêm hoặc Sửa
        document.getElementById('khoaHocForm').onsubmit = async (e) => {
            e.preventDefault();
            const payload = {
                makh: document.getElementById('makh').value,
                magv: document.getElementById('magv').value,
                tenkhoahoc: document.getElementById('tenkhoahoc').value,
                mota: document.getElementById('mota').value,
                lotrinh: document.getElementById('lotrinh').value,
                giatien: document.getElementById('giatien').value
            };

            const url = isEdit ? `/api/khoahoc/${payload.makh}` : '/api/khoahoc';
            const method = isEdit ? 'PUT' : 'POST';

            try {
                const res = await fetch(url, {
                    method: method,
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                const result = await res.json();
                
                if (res.ok) {
                    alert(result.message);
                    resetForm();
                    loadCourses();
                } else {
                    alert('LỖI: ' + result.message);
                }
            } catch (err) {
                alert('Lỗi kết nối server');
            }
        };

        async function deleteCourse(id) {
            if (!confirm('Bạn có chắc chắn muốn xóa?')) return;
            const res = await fetch(`/api/khoahoc/${id}`, { method: 'DELETE' });
            const result = await res.json();
            if (res.ok) {
                alert(result.message);
                loadCourses();
            } else {
                alert('LỖI: ' + result.message);
            }
        }

        function editCourse(makh, magv, ten, gia) {
            isEdit = true;
            document.getElementById('makh').value = makh;
            document.getElementById('makh').readOnly = true;
            document.getElementById('magv').value = magv === 'null' ? '' : magv;
            document.getElementById('tenkhoahoc').value = ten;
            document.getElementById('giatien').value = gia;
            document.getElementById('formTitle').innerText = 'Chỉnh Sửa Khóa Học';
            document.getElementById('btnSave').className = 'btn btn-success';
        }

        function resetForm() {
            isEdit = false;
            document.getElementById('khoaHocForm').reset();
            document.getElementById('makh').readOnly = false;
            document.getElementById('formTitle').innerText = 'Thêm Khóa Học Mới';
            document.getElementById('btnSave').className = 'btn btn-primary';
        }

        loadCourses();
    </script>
</body>
</html>
